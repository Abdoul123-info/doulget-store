<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DoulGet — Confirmation du paiement</title>
<link rel="icon" href="icon.png">
<style>
  :root { --bg:#070d1a; --card:#0d1628; --line:#1d2f52; --blue:#3b82f6; --txt:#e8eefc; --mut:#8ea3c8; --ok:#34d399; --bad:#f87171; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--txt); font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh; }
  .wrap { max-width:520px; margin:0 auto; padding:36px 16px 48px; text-align:center; }
  img.logo { width:64px; height:64px; border-radius:16px; }
  h1 { font-size:22px; margin:14px 0 26px; }
  .box { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:26px 20px; }
  .spin { width:44px; height:44px; border:4px solid var(--line); border-top-color:var(--blue); border-radius:50%; margin:0 auto 18px; animation:r 1s linear infinite; }
  @keyframes r { to { transform:rotate(360deg); } }
  .big { font-size:44px; margin-bottom:12px; }
  .st { font-size:16px; font-weight:600; margin-bottom:8px; }
  .sub { color:var(--mut); font-size:13.5px; line-height:1.7; }
  .keybox { margin:18px 0 10px; background:#050a14; border:2px dashed var(--blue); border-radius:12px; padding:16px 12px; font-family:Consolas,monospace; font-size:14px; word-break:break-all; color:var(--ok); }
  .copy { margin-top:10px; background:var(--blue); color:#fff; border:0; border-radius:10px; font-size:14px; font-weight:700; padding:11px 22px; cursor:pointer; }
  .copy:active { transform:scale(.97); }
  .steps { text-align:left; margin-top:22px; background:rgba(59,130,246,.06); border:1px solid var(--line); border-radius:12px; padding:14px 16px; }
  .steps b { display:block; font-size:13px; margin-bottom:8px; }
  .steps ol { padding-left:18px; color:var(--mut); font-size:13px; line-height:2; }
  a { color:var(--blue); text-decoration:none; }
  .retry { display:inline-block; margin-top:16px; font-size:13.5px; }
</style>
</head>
<body>
<div class="wrap">
  <img class="logo" src="icon.png" alt="DoulGet">
  <h1>Confirmation du paiement</h1>

  <div class="box" id="box">
    <div class="spin"></div>
    <div class="st">Vérification en cours...</div>
    <div class="sub">Nous confirmons votre paiement auprès de l'opérateur.<br>Cela prend généralement quelques secondes.</div>
  </div>
</div>

<script>
  var API = 'https://gqrwykhhqjimsgiqkgut.supabase.co/functions/v1/buy-license';
  var orderId = new URLSearchParams(location.search).get('order') || '';
  try { if (!orderId) orderId = localStorage.getItem('doulget_last_order') || ''; } catch(e) {}
  var box = document.getElementById('box');
  var tries = 0;

  function showKey(key, machineBound, label) {
    var extra = machineBound
      ? '<div class="steps"><b>💻 Activation automatique</b><ol><li>Retournez dans l\'application DoulGet sur votre ordinateur</li><li>Elle détecte votre paiement et s\'active toute seule</li><li>Si besoin, collez la clé ci-dessus manuellement</li></ol></div>'
      : '<div class="steps"><b>Pour activer DoulGet :</b><ol><li>Ouvrez l\'application DoulGet</li><li>Collez la clé dans le champ d\'activation</li><li>Cliquez sur « Activer » — c\'est tout !</li></ol></div>';
    box.innerHTML =
      '<div class="big">🎉</div>' +
      '<div class="st" style="color:var(--ok)">Paiement confirmé — merci !</div>' +
      '<div class="sub">Votre licence <b>' + (label || '') + '</b> est prête :</div>' +
      '<div class="keybox" id="key">' + key + '</div>' +
      '<button class="copy" onclick="copyKey()">📋 Copier la clé</button>' +
      extra +
      '<div class="sub" style="margin-top:16px">Gardez cette clé précieusement (capture d\'écran recommandée).</div>';
  }

  function showFail() {
    box.innerHTML =
      '<div class="big">😕</div>' +
      '<div class="st" style="color:var(--bad)">Paiement non confirmé</div>' +
      '<div class="sub">Le paiement a échoué ou a été annulé.<br>Aucun montant validé = aucune licence débitée.</div>' +
      '<a class="retry" href="index.html">← Réessayer le paiement</a>';
  }

  function showLost() {
    box.innerHTML =
      '<div class="big">⏳</div>' +
      '<div class="st">Toujours en attente...</div>' +
      '<div class="sub">Votre paiement est peut-être encore en cours de traitement chez l\'opérateur.<br>Revenez sur cette page dans quelques minutes — elle se souviendra de votre commande.</div>' +
      '<a class="retry" href="javascript:location.reload()">🔄 Re-vérifier maintenant</a>';
  }

  function copyKey() {
    var k = document.getElementById('key').textContent;
    (navigator.clipboard ? navigator.clipboard.writeText(k) : Promise.reject()).then(function(){
      alert('Clé copiée !');
    }).catch(function(){
      var r = document.createRange(); r.selectNode(document.getElementById('key'));
      window.getSelection().removeAllRanges(); window.getSelection().addRange(r);
    });
  }

  async function poll() {
    if (!orderId) { showLost(); return; }
    tries++;
    try {
      var res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'check-order', orderId: orderId })
      });
      var j = await res.json();
      if (j.success && j.status === 'paid' && j.licenseKey) { showKey(j.licenseKey, j.machineBound, j.planLabel); return; }
      if (j.success && j.status === 'failed') { showFail(); return; }
    } catch (e) {}
    if (tries < 45) setTimeout(poll, 4000);
    else showLost();
  }
  poll();
</script>
</body>
</html>
